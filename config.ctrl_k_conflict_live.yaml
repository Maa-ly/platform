# Live configuration for Ctrl+K Ctrl+C shortcut-collision submission.
# Required environment variable:
#   GH_TOKEN

runtime:
  state_dir: .audit_state_keeper_ctrl_k_conflict_live
  poll_interval_seconds: 120
  valid_target_per_repo: 1
  stop_when_targets_met: true

submission:
  title_template: "[Bug][alpha]{title}"
  issue_repo: "PlatformNetwork/bounty-challenge"

external_dedup:
  repo: "https://github.com/PlatformNetwork/bounty-challenge/issues"
  token_env: GH_TOKEN

proof:
  allowed_image_extensions: [".png", ".jpg", ".jpeg", ".gif"]
  allowed_video_extensions: [".mp4", ".mov", ".webm"]
  upload_cmd: "PROOF_UPLOAD_BACKEND=github_attachment PROOF_GIST_BACKUP=1 python3 ./detectors/upload_proof_catbox.py {file_path}"
  auto_capture_cmd: "CORTEX_ALLOW_WSL_HOST_CAPTURE=1 CORTEX_FORCE_WSL_HOST_VIDEO=1 CORTEX_CAPTURE_VIDEO_SECONDS=10 CORTEX_CAPTURE_EXTRA_SHOTS=1 CORTEX_CAPTURE_VIDEO_FPS=20 CORTEX_WSL_VIDEO_ACTIONS_FILE=./detectors/cortex_wsl_video_actions.json CORTEX_APP_NAME='Cortex IDE' CORTEX_WINDOW_TITLE='Cortex IDE' CORTEX_LAUNCH_CMD='CC=gcc npm run tauri:dev' CORTEX_LAUNCH_TIMEOUT=1200 CORTEX_STRICT_FULL_GUI=1 CORTEX_REQUIRE_ACTION_CLICK=1 python3 ./detectors/cortex_gui_capture.py --repo-path {repo_path} --finding-id {finding_id} --file {evidence_file} --line {evidence_line}"
  screenshot_example_url: "https://github.com/PlatformNetwork/bounty-challenge/issues/22537"
  video_example_url: "https://github.com/PlatformNetwork/bounty-challenge/issues/22534"
  banned_format_url: "https://github.com/PlatformNetwork/bounty-challenge/issues/22375#issuecomment-3983776205"

repositories:
  - name: live-1
    github_name: Maa-ly
    token: GH_TOKEN
  - name: live-2
    github_name: Maa-ly
    token: GH_TOKEN
  - name: live-3
    github_name: Maa-ly
    token: GH_TOKEN
  - name: live-4
    github_name: Maa-ly
    token: GH_TOKEN
  - name: live-5
    github_name: Maa-ly
    token: GH_TOKEN
  - name: live-6
    github_name: Maa-ly
    token: GH_TOKEN

prompts:
  - id: cortex-ctrl-k-conflict-live
    severity: critical
    detector_cmd: >-
      python3 ./detectors/cortex_event_routing_detector.py |
      python3 -c 'import json,sys; data=json.load(sys.stdin); print(json.dumps([x for x in data if x.get("finding_id")=="shortcut-ctrl-k-ctrl-c-centered-layout-conflict"]))'
    prompt: |-
      Validate the Cortex GUI bug where `Ctrl+K Ctrl+C` is assigned to both
      `Add Line Comment` and `Toggle Centered Layout`, creating an ambiguous
      shortcut and making keyboard behavior unreliable.
