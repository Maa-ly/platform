# Single-finding live submission config for the F5 title-bar icon mismatch.
# Required env vars when running:
#   GH_TOKEN
#   GH_EXTERNAL_DEDUP_TOKEN

runtime:
  state_dir: .audit_state_keeper_live_f5_icon
  poll_interval_seconds: 120
  valid_target_per_repo: 1
  stop_when_targets_met: true

submission:
  title_template: "[Bug][alpha]{title}"
  issue_repo: "PlatformNetwork/bounty-challenge"

external_dedup:
  repo: "https://github.com/PlatformNetwork/bounty-challenge/issues"
  token_env: GH_EXTERNAL_DEDUP_TOKEN

proof:
  allowed_image_extensions: [".png", ".jpg", ".jpeg", ".gif"]
  allowed_video_extensions: [".mp4", ".mov", ".webm"]
  upload_cmd: "PROOF_UPLOAD_BACKEND=github_attachment PROOF_GH_TOKEN=$GH_TOKEN PROOF_GH_REPO=PlatformNetwork/bounty-challenge PROOF_GIST_BACKUP=1 python3 ./detectors/upload_proof_catbox.py {file_path}"
  auto_capture_cmd: "python3 ./detectors/cortex_process_cleanup.py >/dev/null 2>&1 || true; CORTEX_ALLOW_WSL_HOST_CAPTURE=1 CORTEX_FORCE_WSL_HOST_VIDEO=1 CORTEX_CAPTURE_VIDEO_SECONDS=8 CORTEX_CAPTURE_EXTRA_SHOTS=1 CORTEX_CAPTURE_VIDEO_FPS=20 CORTEX_WSL_VIDEO_ACTIONS_FILE=./detectors/cortex_wsl_video_actions.json CORTEX_APP_NAME='Cortex IDE' CORTEX_WINDOW_TITLE='Cortex IDE' CORTEX_LAUNCH_CMD='CC=gcc npm run tauri:dev' CORTEX_LAUNCH_TIMEOUT=240 CORTEX_STRICT_FULL_GUI=1 CORTEX_REQUIRE_ACTION_CLICK=1 CORTEX_REQUIRE_OPEN_WORKSPACE=1 python3 ./detectors/cortex_gui_capture.py --repo-path {repo_path} --finding-id {finding_id} --file {evidence_file} --line {evidence_line}"
  screenshot_example_url: "https://github.com/PlatformNetwork/bounty-challenge/issues/22537"
  video_example_url: "https://github.com/PlatformNetwork/bounty-challenge/issues/22534"
  banned_format_url: "https://github.com/PlatformNetwork/bounty-challenge/issues/22375#issuecomment-3983776205"

repositories:
  - name: kid
    github_name: kidinwhitegati
    token: GH_TOKEN
  - name: marvin
    github_name: marvinayisi
    token: GH_TOKEN
  - name: kid-2
    github_name: kidinwhitegati
    token: GH_TOKEN
  - name: marvin-2
    github_name: marvinayisi
    token: GH_TOKEN
  - name: kid-3
    github_name: kidinwhitegati
    token: GH_TOKEN
  - name: marvin-3
    github_name: marvinayisi
    token: GH_TOKEN

prompts:
  - id: cortex-f5-icon-mismatch
    severity: critical
    detector_cmd: "python3 ./detectors/cortex_f5_icon_mismatch_detector.py"
    prompt: |-
      Validate a user-visible GUI mismatch where top-level control semantics
      (tooltip/action) conflict with the displayed icon glyph.
