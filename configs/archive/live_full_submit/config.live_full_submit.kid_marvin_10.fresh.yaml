proof:
  allowed_image_extensions:
  - .png
  - .jpg
  - .jpeg
  - .gif
  allowed_video_extensions:
  - .mp4
  - .mov
  - .webm
  upload_cmd: PROOF_UPLOAD_BACKEND=github_repo PROOF_GH_TOKEN=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
    PROOF_GH_REPO=marvinayisi/todolist2 PROOF_GIST_BACKUP=1 python3 ./detectors/upload_proof_catbox.py
    {file_path}
  auto_capture_cmd: python3 ./detectors/cortex_process_cleanup.py >/dev/null 2>&1
    || true; CORTEX_ALLOW_WSL_HOST_CAPTURE=1 CORTEX_FORCE_WSL_HOST_VIDEO=0 CORTEX_CAPTURE_VIDEO_SECONDS=10
    CORTEX_CAPTURE_EXTRA_SHOTS=1 CORTEX_CAPTURE_VIDEO_FPS=20 CORTEX_WSL_VIDEO_ACTIONS_FILE=./detectors/cortex_wsl_video_actions.json
    CORTEX_APP_NAME='Cortex IDE' CORTEX_WINDOW_TITLE='Cortex IDE' CORTEX_LAUNCH_CMD='CC=gcc
    npm run tauri:dev' CORTEX_LAUNCH_TIMEOUT=300 CORTEX_STRICT_FULL_GUI=1 CORTEX_REQUIRE_ACTION_CLICK=1
    CORTEX_REQUIRE_OPEN_WORKSPACE=1 python3 ./detectors/cortex_gui_capture.py --repo-path
    {repo_path} --finding-id {finding_id} --file {evidence_file} --line {evidence_line}
